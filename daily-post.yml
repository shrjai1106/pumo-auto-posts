name: PUMO Daily Instagram Agent

on:
  schedule:
    - cron: '0 1 * * *'   # 9AM Malaysia time (1AM UTC) every day
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  create-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install FFmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu espeak

      - name: Install Python dependencies
        run: pip install requests

      - name: Run PUMO Agent
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          REVID_API_KEY:       ${{ secrets.REVID_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
        run: python agent.py

      - name: Report on failure
        if: failure()
        run: |
          echo "❌ Agent failed. Common fixes:"
          echo "  - Check all 4 secrets are added in GitHub Settings"
          echo "  - Check Anthropic billing is active"
          echo "  - Check ElevenLabs free tier has remaining credits"
          echo "  - Check Upload-Post API key is correct"
          echo "  - Check Instagram account is connected in Upload-Post dashboard"
